<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Visualizer - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="welcome-body">
    
    <!-- CREATE ACCOUNT BOX -->
    <div id="signup-box" class="welcome-container login-box">
        <h1>Create Account</h1>
        <p>Register to access the DSA Visualizer.</p>
        
        <form id="signup-form">
            <input type="text" id="reg-username" class="auth-input" placeholder="Choose a Username" required>
            <input type="password" id="reg-password" class="auth-input" placeholder="Choose a Password" required>
            <input type="password" id="reg-confirm" class="auth-input" placeholder="Confirm Password" required>
            <button type="submit" class="start-link" style="width: 100%; border: none; cursor: pointer;">Sign Up</button>
        </form>
        
        <p id="signup-msg" style="margin-top: 10px; font-weight: bold;"></p>
        
        <p class="toggle-text">Already have an account? 
            <span class="toggle-link" onclick="toggleView('login')">Login here</span>
        </p>
    </div>

    <!-- LOGIN BOX (Hidden by default) -->
    <div id="login-box" class="welcome-container login-box" style="display: none;">
        <h1>Student Login</h1>
        <p>Enter your credentials to continue.</p>
        
        <form id="login-form">
            <input type="text" id="username" class="auth-input" placeholder="Username" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="start-link" style="width: 100%; border: none; cursor: pointer;">Login</button>
        </form>
        
        <p id="login-error-msg" style="color: #e74c3c; display: none; margin-top: 10px; font-weight: bold;">Invalid username or password.</p>
        
        <p class="toggle-text">Don't have an account? 
            <span class="toggle-link" onclick="toggleView('signup')">Create one</span>
        </p>
    </div>

    <script>
        function toggleView(view) {
            if (view === 'login') {
                document.getElementById('signup-box').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
            } else {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('signup-box').style.display = 'block';
            }
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const user = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const msg = document.getElementById('signup-msg');

            if (pass !== confirm) {
                msg.style.color = "#e74c3c"; 
                msg.innerText = "Passwords do not match!";
                return;
            }

            localStorage.setItem(user, pass);
            msg.style.color = "#2ecc71"; 
            msg.innerText = "Account created! Redirecting to login...";
            
            setTimeout(() => {
                document.getElementById('signup-form').reset();
                msg.innerText = "";
                toggleView('login');
            }, 1500); 
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const storedPass = localStorage.getItem(user);

            if (storedPass && storedPass === pass) {
                window.location.href = "welcome.html";
            } else {
                document.getElementById('login-error-msg').style.display = "block";
            }
        });
    </script>
</body>
</html>
