<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Algorithms Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>DSA Visualizer</h1>
        <div class="controls">
            <select id="algo-select">
                <optgroup label="Sorting">
                    <option value="bubbleSort">1. Bubble Sort</option>
                    <option value="selectionSort">2. Selection Sort</option>
                </optgroup>
                <optgroup label="Searching">
                    <option value="linearSearch">3. Linear Search</option>
                    <option value="binarySearch">4. Binary Search</option>
                </optgroup>
                <optgroup label="Stack">
                    <option value="stackOps">5. Stack (Push & Pop)</option>
                </optgroup>
                <optgroup label="Array Problems">
                    <option value="reverseArray">6. Reverse an Array</option>
                    <option value="findMax">7. Find Maximum Element</option>
                    <option value="moveZeroes">8. Move Zeroes to End</option>
                    <option value="twoPointerSum">9. Two Pointer Pair Sum</option>
                    <option value="palindromeArray">10. Check Palindrome Array</option>
                </optgroup>
            </select>
            <button id="generate-btn">Generate Random Array</button>
            <button id="start-btn" class="action-btn">Visualize</button>
        </div>
        
        <div class="custom-input-group">
            <input type="text" id="custom-array-input" placeholder="Enter array (e.g. 10, 20, 30, 20, 10)">
            <button id="apply-input-btn">Apply User Array</button>
        </div>

        <div class="speed-control-group">
            <label for="speed-slider">Animation Speed:</label>
            <input type="range" id="speed-slider" min="1" max="100" value="50">
        </div>

        <h3 id="status-text">Select an algorithm and click Visualize</h3>
    </div>
    
    <div id="array-container" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
